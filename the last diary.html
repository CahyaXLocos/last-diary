            position: fixed;

            pointer-events: none;
            z-index: 100;
            animation: floatUp 6s linear forwards;
            opacity: 0.8;
        }

            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.4;

        }

            0%, 100% { opacity: 0.2; }

            display: none;

            z-index: 10;

            margin: 0 auto;
            padding: 40px 20px 60px;
            min-height: 100vh;

            border-radius: 45px;

            margin-bottom: 25px;
            border: 1px solid rgba(255, 192, 208, 0.3);

            justify-content: center;
            margin-top: 25px;
        }

            background: rgba(255, 119, 143, 0.9);
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            backdrop-filter: blur(4px);
            transition: 0.07s linear;
            text-align: center;
        }

        .btn-nav:active {
            transform: scale(0.97);
        }

        .btn-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Gallery grid */
        .gallery-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-item {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(4px);

            font-weight: bold;
            color: #ff99aa;
            margin-bottom: 12px;

            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid rgba(255,153,170,0.5);
        }

        .gallery-img:active {

            gap: 15px;
            margin: 25px 0;

            top: 0;
            left: 0;

            height: 100%;
            background: rgba(0,0,0,0.95);

    </style>

            // Floating hearts
            for(let i = 0; i < 20; i++) {
                setTimeout(() => createFloatingHeart(), i * 60);
            }
            
            // Teks "cahya has left the chat"
            setTimeout(() => {
                const chatDiv = document.createElement('div');
                chatDiv.style.position = 'fixed';
                chatDiv.style.bottom = '30px';
                chatDiv.style.left = '50%';
                chatDiv.style.transform = 'translateX(-50%)';
                chatDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
                chatDiv.style.padding = '10px 20px';
                chatDiv.style.borderRadius = '40px';
                chatDiv.style.zIndex = '4000';
                chatDiv.style.fontSize = '0.9rem';
                chatDiv.style.border = '1px solid #ff99aa';
                chatDiv.innerHTML = 'cahya has left the chat. 😭';
                document.body.appendChild(chatDiv);
                setTimeout(() => chatDiv.remove(), 4000);
            }, 500);
            
            overlay.onclick = () => overlay.remove();
        }, 5000);
    }
    
    // ========== HELPER FUNCTIONS ==========
    function attachModalListeners() {
        document.querySelectorAll('.gallery-img[data-modal="true"]').forEach(img => {
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                const modal = document.getElementById('imageModal');
                const modalImg = document.getElementById('modalImage');
                modalImg.src = img.src;
                modal.style.display = 'flex';
            });
        });
    }
    
    const modal = document.getElementById('imageModal');
    const closeModalBtn = document.querySelector('.image-modal .close-modal');
    if (closeModalBtn) closeModalBtn.onclick = () => modal.style.display = 'none';
    if (modal) modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    
    function createFloatingHeart() {
        const heart = document.createElement('div');
        heart.classList.add('floating-heart');
        const hearts = ['❤️', '💖', '💗', '💓', '🌸', '🌻', '💕', '💞'];
        heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = (Math.random() * 20 + 16) + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }
    
    // Mulai dari halaman 1
    renderPage(1);
</script>
</body>
</html>
